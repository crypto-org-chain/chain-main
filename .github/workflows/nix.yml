name: nix flow
on:
  pull_request:
  merge_group:
  push:
    branches:
      - master
      - release/**
    tags:
      - "*"

env:
  NIXPKGS_ALLOW_INSECURE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: cachix/install-nix-action@fc6e360bedc9ee72d75e701397f0bb30dce77568 # v31.2
        with:
          nix_path: nixpkgs=channel:nixos-25.05
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@0fc020193b5a1fa3ac4575aa3a7d3aa6a35435ad # v16
        with:
          name: crypto-com
          skipPush: true
      - name: lint
        run: make lint-ci

  changes:
    name: Detect changed paths (for conditional upgrade tests)
    runs-on: ubuntu-latest
    outputs:
      upgrade: ${{ steps.decide.outputs.run }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        if: github.event_name == 'pull_request'
        uses: tj-actions/changed-files@ed68ef82c095e0d48ec87eccea555d944a631a4c # v46.0.5
        with:
          files: |
            app/**
            cmd/**
            x/**
            proto/**
            go.mod
            go.sum
            gomod2nix.toml
            default.nix
            nix/**
            integration_tests/test_upgrade.py
            integration_tests/upgrade-test.nix
            integration_tests/configs/cosmovisor.jsonnet
            Makefile
            .github/workflows/nix.yml
      - id: decide
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=${{ steps.filter.outputs.any_changed }}" >> "$GITHUB_OUTPUT"
          fi

  prepare:
    name: Prepare nix store (build chain-maind-test, push to cachix)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: cachix/install-nix-action@fc6e360bedc9ee72d75e701397f0bb30dce77568 # v31.2
        with:
          nix_path: nixpkgs=channel:nixos-25.05
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@0fc020193b5a1fa3ac4575aa3a7d3aa6a35435ad # v16
        with:
          name: crypto-com
          # fork PR secret is empty — cachix-action tolerates and skips push
          signingKey: "${{ secrets.CACHIX_SIGNING_KEY }}"
      - name: Build integration test shell (chain-maind-test + deps)
        run: nix-store -r $(nix-instantiate integration_tests/shell.nix)

  test:
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: cachix/install-nix-action@fc6e360bedc9ee72d75e701397f0bb30dce77568 # v31.2
        with:
          nix_path: nixpkgs=channel:nixos-25.05
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@0fc020193b5a1fa3ac4575aa3a7d3aa6a35435ad # v16
        with:
          name: crypto-com
          # github don't pass secrets for pull request from fork repos,
          # in that case the push is disabled naturally.
          signingKey: "${{ secrets.CACHIX_SIGNING_KEY }}"
      - name: Run integration tests
        run: make nix-integration-test
      - name: Convert coverage data
        run: |
           nix profile add nixpkgs#go_1_25
           go tool covdata textfmt -i=coverage -o profile.txt
      - name: Upload coverage report
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./profile.txt
          flags: integration_tests
      - name: Tar debug files
        if: failure()
        run: tar cfz debug_files.tar.gz -C "${TMPDIR-/run/user/1001}/pytest-of-runner" .
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: debug_files
          path: debug_files.tar.gz
          if-no-files-found: ignore

  upload-cache:
    if: github.event_name == 'push'
    needs: ["test"]
    strategy:
      matrix:
        os: [macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: cachix/install-nix-action@fc6e360bedc9ee72d75e701397f0bb30dce77568 # v31.2
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@0fc020193b5a1fa3ac4575aa3a7d3aa6a35435ad # v16
        with:
          name: crypto-com
          # github don't pass secrets for pull request from fork repos,
          # in that case the push is disabled naturally.
          signingKey: "${{ secrets.CACHIX_SIGNING_KEY }}"
      - name: 'instantiate integration test env'
        run: nix-store -r $(nix-instantiate integration_tests/shell.nix)

  test-upgrade-manual:
    runs-on: ubuntu-latest
    needs: [prepare, changes]
    steps:
      - name: Check if upgrade test should run
        id: gate
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ] || [ "${{ needs.changes.outputs.upgrade }}" = "true" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping test-upgrade-manual — no upgrade-relevant paths changed"
          fi
      - name: Create more disk space
        if: steps.gate.outputs.run == 'true'
        run: sudo rm -rf /usr/share/dotnet && sudo rm -rf /opt/ghc && sudo rm -rf "/usr/local/share/boost" && sudo rm -rf "$AGENT_TOOLSDIRECTORY"
      - uses: actions/checkout@v4
        if: steps.gate.outputs.run == 'true'
        with:
          submodules: true
      - uses: cachix/install-nix-action@fc6e360bedc9ee72d75e701397f0bb30dce77568 # v31.2
        if: steps.gate.outputs.run == 'true'
        with:
          nix_path: nixpkgs=channel:nixos-25.05
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@0fc020193b5a1fa3ac4575aa3a7d3aa6a35435ad # v16
        if: steps.gate.outputs.run == 'true'
        with:
          name: crypto-com
      - name: Run integration tests
        if: steps.gate.outputs.run == 'true'
        run: make nix-integration-test-upgrade-manual
      - name: Convert coverage data
        if: steps.gate.outputs.run == 'true'
        run: |
           nix profile add nixpkgs#go_1_25
           go tool covdata textfmt -i=coverage -o profile.txt
      - name: Upload coverage report
        if: steps.gate.outputs.run == 'true'
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./profile.txt
          flags: integration_tests_upgrade_manual
      - name: Tar debug files
        if: failure() && steps.gate.outputs.run == 'true'
        run: tar cfz debug_files_upgrade_manual.tar.gz -C "${TMPDIR-/run/user/1001}/pytest-of-runner" .
      - uses: actions/upload-artifact@v4
        if: failure() && steps.gate.outputs.run == 'true'
        with:
          name: debug_files_upgrade_manual
          path: debug_files_upgrade_manual.tar.gz
          if-no-files-found: ignore

