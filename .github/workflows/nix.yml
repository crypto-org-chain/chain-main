  test-slow:
    runs-on: ubuntu-latest
    needs: [test-slow-a, test-slow-b1, test-slow-b2]
    if: always()
    steps:
      - name: Aggregate slow test results
        run: |
          for r in "${{ needs.test-slow-a.result }}" "${{ needs.test-slow-b1.result }}" "${{ needs.test-slow-b2.result }}"; do
            case "$r" in
              success|skipped) ;;
              *) echo "failed: $r"; exit 1 ;;
            esac
          done

