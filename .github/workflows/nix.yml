name: nix flow
on:
  pull_request:
  merge_group:
  push:
    branches:
      - master
      - release/**
    tags:
      - "*"

env:
  NIXPKGS_ALLOW_INSECURE: 1
  # Opt into Node 24 for JavaScript actions; default flips on 2026-06-02.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f # v31.10.5
        with:
          nix_path: nixpkgs=channel:nixos-25.05
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: crypto-com
          skipPush: true
      - name: lint
        run: make lint-ci

  changes:
    name: Detect changed paths (for conditional upgrade tests)
    runs-on: ubuntu-latest
    outputs:
      upgrade: ${{ steps.decide.outputs.run }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: filter
        if: github.event_name == 'pull_request'
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: |
            app/**
            cmd/**
            x/**
            proto/**
            go.mod
            go.sum
            gomod2nix.toml
            default.nix
            nix/**
            integration_tests/test_upgrade.py
            integration_tests/upgrade-test.nix
            integration_tests/configs/cosmovisor.jsonnet
            Makefile
            .github/workflows/nix.yml
      - id: decide
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=${{ steps.filter.outputs.any_changed }}" >> "$GITHUB_OUTPUT"
          fi

  prepare:
    name: Prepare nix store (build chain-maind-test, push to cachix)
    runs-on: ubuntu-latest
    needs: [changes]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f # v31.10.5
        with:
          nix_path: nixpkgs=channel:nixos-25.05
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: crypto-com
          # fork PR secret is empty — cachix-action tolerates and skips push
          signingKey: "${{ secrets.CACHIX_SIGNING_KEY }}"
      - name: Build integration test shell (chain-maind-test + deps)
        run: nix-store -r $(nix-instantiate integration_tests/shell.nix)

  prepare-upgrade:
    name: Prepare upgrade binaries (push to cachix)
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name != 'pull_request' || needs.changes.outputs.upgrade == 'true'
    timeout-minutes: 60
    steps:
      - name: Create more disk space
        run: sudo rm -rf /usr/share/dotnet && sudo rm -rf /opt/ghc && sudo rm -rf "/usr/local/share/boost" && sudo rm -rf "$AGENT_TOOLSDIRECTORY"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f # v31.10.5
        with:
          nix_path: nixpkgs=channel:nixos-25.05
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: crypto-com
          signingKey: "${{ secrets.CACHIX_SIGNING_KEY }}"
      - name: Build upgrade test binaries (push to cachix)
        run: nix-build integration_tests/upgrade-test.nix -o /tmp/upgrade-test

  test:
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f # v31.10.5
        with:
          nix_path: nixpkgs=channel:nixos-25.05
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: crypto-com
          # github don't pass secrets for pull request from fork repos,
          # in that case the push is disabled naturally.
          signingKey: "${{ secrets.CACHIX_SIGNING_KEY }}"
      - name: Run integration tests
        run: make nix-integration-test
      - name: Convert coverage data
        run: |
           nix profile add nixpkgs#go_1_25
           go tool covdata textfmt -i=coverage -o profile.txt
      - name: Upload coverage report
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./profile.txt
          flags: integration_tests
      - name: Tar debug files
        if: failure()
        run: tar cfz debug_files.tar.gz -C "${TMPDIR-/run/user/1001}/pytest-of-runner" .
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: debug_files
          path: debug_files.tar.gz
          if-no-files-found: ignore

  upload-cache:
    if: github.event_name == 'push'
    needs: ["test"]
    strategy:
      matrix:
        os: [macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f # v31.10.5
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: crypto-com
          # github don't pass secrets for pull request from fork repos,
          # in that case the push is disabled naturally.
          signingKey: "${{ secrets.CACHIX_SIGNING_KEY }}"
      - name: 'instantiate integration test env'
        run: nix-store -r $(nix-instantiate integration_tests/shell.nix)

  test-upgrade:
    runs-on: ubuntu-latest
    needs: [prepare, prepare-upgrade, changes]
    if: github.event_name != 'pull_request' || needs.changes.outputs.upgrade == 'true'
    steps:
      - name: Create more disk space
        run: sudo rm -rf /usr/share/dotnet && sudo rm -rf /opt/ghc && sudo rm -rf "/usr/local/share/boost" && sudo rm -rf "$AGENT_TOOLSDIRECTORY"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f # v31.10.5
        with:
          nix_path: nixpkgs=channel:nixos-25.05
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: crypto-com
      - name: Run integration tests
        run: make nix-integration-test-upgrade
      - name: Convert coverage data
        run: |
           nix profile add nixpkgs#go_1_25
           go tool covdata textfmt -i=coverage -o profile.txt
      - name: Upload coverage report
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./profile.txt
          flags: integration_tests_upgrade
      - name: Tar debug files
        if: failure()
        run: tar cfz debug_files_upgrade.tar.gz -C "${TMPDIR-/run/user/1001}/pytest-of-runner" .
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: debug_files_upgrade
          path: debug_files_upgrade.tar.gz
          if-no-files-found: ignore

