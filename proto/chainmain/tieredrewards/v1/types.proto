syntax = "proto3";
package chainmain.tieredrewards.v1;

import "amino/amino.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/crypto-org-chain/chain-main/x/tieredrewards/types";

// Tier defines a single tier stored in module state.
message Tier {
  // id is the unique identifier for this tier.
  uint32 id = 1;

  // exit_duration is the duration a user must wait after triggering exit before they can claim.
  google.protobuf.Duration exit_duration = 2
      [(gogoproto.nullable) = false, (gogoproto.stdduration) = true, (amino.dont_omitempty) = true];

  // bonus_apy is the fixed bonus APY (per year) for this tier, e.g. "0.04" = 4%.
  string bonus_apy = 3 [
    (cosmos_proto.scalar)  = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable)   = false,
    (amino.dont_omitempty) = true
  ];

  // min_lock_amount is the minimum amount (in bond denom) required when creating a new position in this tier.
  string min_lock_amount = 4 [
    (cosmos_proto.scalar)  = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable)   = false,
    (amino.dont_omitempty) = true
  ];

  // close_only when true prevents new positions from being created in this tier.
  // Existing positions can still trigger exit, undelegate, withdraw rewards, and claim.
  bool close_only = 5;
}

// Position represents a single lock position in the tier.
message Position {
  // id is the unique identifier for this position.
  uint64 id = 1;

  // owner is the address that owns this position.
  string owner = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // tier_id references the Tier this position belongs to.
  uint32 tier_id = 3;

  // amount is the token amount for undelegated positions. For delegated positions
  // this is always zero — the live token value is derived from
  // validator.TokensFromShares(delegated_shares).
  string amount = 4 [
    (cosmos_proto.scalar)  = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable)   = false,
    (amino.dont_omitempty) = true
  ];

  // validator is the validator operator address if delegated; empty if not delegated.
  string validator = 5 [(cosmos_proto.scalar) = "cosmos.ValidatorAddressString"];

  // delegated_shares are the validator delegation shares for this position.
  string delegated_shares = 6 [
    (cosmos_proto.scalar)  = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable)   = false,
    (amino.dont_omitempty) = true
  ];

  // last_bonus_accrual is the last time bonus rewards was claimed.
  google.protobuf.Timestamp last_bonus_accrual = 7
      [(gogoproto.nullable) = false, (gogoproto.stdtime) = true, (amino.dont_omitempty) = true];

  // last_event_seq is the sequence number of the last validator event this
  // position has processed. Events with seq > last_event_seq are pending.
  uint64 last_event_seq = 8;

  // last_known_bonded tracks whether the validator was bonded after the last
  // event replay. Used as the starting state for the next processEventsAndClaimBonus
  // call. True when the position is first created (only bonded validators accepted).
  bool last_known_bonded = 9;

  // exit_triggered_at is the time when exit was triggered. Zero value means not exiting.
  google.protobuf.Timestamp exit_triggered_at = 10
      [(gogoproto.nullable) = false, (gogoproto.stdtime) = true, (amino.dont_omitempty) = true];

  // exit_unlock_at is when the user can claim tokens (exit_triggered_at + tier.exit_duration).
  google.protobuf.Timestamp exit_unlock_at = 11
      [(gogoproto.nullable) = false, (gogoproto.stdtime) = true, (amino.dont_omitempty) = true];

  // created_at_height is the block height when this position was created.
  uint64 created_at_height = 12;

  // created_at_time is the block time when this position was created.
  google.protobuf.Timestamp created_at_time = 13
      [(gogoproto.nullable) = false, (gogoproto.stdtime) = true, (amino.dont_omitempty) = true];
}

// PositionResponse is the query-facing representation of a position.
// Unlike the stored Position, the `amount` field always contains the
// meaningful token value: TokensFromShares for delegated positions,
// or the stored amount for undelegated positions.
message PositionResponse {
  uint64 id      = 1;
  string owner   = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint32 tier_id = 3;
  // amount is the computed token value for this position.
  string amount = 4 [
    (cosmos_proto.scalar)  = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable)   = false,
    (amino.dont_omitempty) = true
  ];
  string validator        = 5 [(cosmos_proto.scalar) = "cosmos.ValidatorAddressString"];
  string delegated_shares = 6 [
    (cosmos_proto.scalar)  = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable)   = false,
    (amino.dont_omitempty) = true
  ];
  google.protobuf.Timestamp last_bonus_accrual = 7
      [(gogoproto.nullable) = false, (gogoproto.stdtime) = true, (amino.dont_omitempty) = true];
  google.protobuf.Timestamp exit_triggered_at = 8
      [(gogoproto.nullable) = false, (gogoproto.stdtime) = true, (amino.dont_omitempty) = true];
  google.protobuf.Timestamp exit_unlock_at = 9
      [(gogoproto.nullable) = false, (gogoproto.stdtime) = true, (amino.dont_omitempty) = true];
  uint64                    created_at_height = 10;
  google.protobuf.Timestamp created_at_time   = 11
      [(gogoproto.nullable) = false, (gogoproto.stdtime) = true, (amino.dont_omitempty) = true];
}

// ValidatorEventType enumerates the types of validator lifecycle events
// recorded for lazy processing.
enum ValidatorEventType {
  VALIDATOR_EVENT_TYPE_UNSPECIFIED = 0;
  VALIDATOR_EVENT_TYPE_SLASH       = 1;
  VALIDATOR_EVENT_TYPE_UNBOND      = 2;
  VALIDATOR_EVENT_TYPE_BOND        = 3;
}

// ValidatorEvent records a validator lifecycle event (slash, unbond, bond)
// for lazy processing during reward claims.
message ValidatorEvent {
  // height is the block height when the event occurred.
  int64 height = 1;

  // timestamp is the block time when the event occurred.
  google.protobuf.Timestamp timestamp = 2
      [(gogoproto.nullable) = false, (gogoproto.stdtime) = true, (amino.dont_omitempty) = true];

  // event_type is the type of event.
  ValidatorEventType event_type = 3;

  // tokens_per_share is the validator's token-per-share rate at event time,
  // used to snapshot the token value for bonus calculation.
  string tokens_per_share = 4 [
    (cosmos_proto.scalar)  = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable)   = false,
    (amino.dont_omitempty) = true
  ];

  // reference_count tracks how many positions still need to process this event.
  // When it reaches zero the event can be garbage-collected.
  uint64 reference_count = 5;
}
