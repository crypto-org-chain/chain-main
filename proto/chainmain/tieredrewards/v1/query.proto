syntax = "proto3";
package chainmain.tieredrewards.v1;

import "amino/amino.proto";
import "chainmain/tieredrewards/v1/genesis.proto";
import "chainmain/tieredrewards/v1/params.proto";
import "chainmain/tieredrewards/v1/types.proto";
import "cosmos/base/query/v1beta1/pagination.proto";
import "cosmos/base/v1beta1/coin.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/crypto-org-chain/chain-main/x/tieredrewards/types";

// Query defines the gRPC querier service.
service Query {
  // Params returns the tieredrewards module parameters.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/chainmain/tieredrewards/v1/params";
  }

  // TierPosition returns a single position by ID.
  rpc TierPosition(QueryTierPositionRequest) returns (QueryTierPositionResponse) {
    option (google.api.http).get = "/chainmain/tieredrewards/v1/position/{position_id}";
  }

  // TierPositionsByOwner returns all positions for a given owner address.
  rpc TierPositionsByOwner(QueryTierPositionsByOwnerRequest) returns (QueryTierPositionsByOwnerResponse) {
    option (google.api.http).get = "/chainmain/tieredrewards/v1/positions/{owner}";
  }

  // TierPositionsByTier returns all positions for a given tier id.
  rpc TierPositionsByTier(QueryTierPositionsByTierRequest) returns (QueryTierPositionsByTierResponse) {
    option (google.api.http).get = "/chainmain/tieredrewards/v1/positions_by_tier/{tier_id}";
  }

  // AllTierPositions returns all positions with pagination.
  rpc AllTierPositions(QueryAllTierPositionsRequest) returns (QueryAllTierPositionsResponse) {
    option (google.api.http).get = "/chainmain/tieredrewards/v1/positions";
  }

  // Tiers returns all tier definitions.
  rpc Tiers(QueryTiersRequest) returns (QueryTiersResponse) {
    option (google.api.http).get = "/chainmain/tieredrewards/v1/tiers";
  }

  // RewardsPoolBalances returns the current balances of the rewards pool.
  rpc RewardsPoolBalances(QueryRewardsPoolBalancesRequest) returns (QueryRewardsPoolBalancesResponse) {
    option (google.api.http).get = "/chainmain/tieredrewards/v1/rewards_pool_balances";
  }

  // EstimatePositionRewards estimates pending base and bonus rewards for a position.
  rpc EstimatePositionRewards(QueryEstimatePositionRewardsRequest) returns (QueryEstimatePositionRewardsResponse) {
    option (google.api.http).get = "/chainmain/tieredrewards/v1/estimate_rewards/{position_id}";
  }

  // VotingPowerByOwner returns the governance voting power from delegated tier
  // positions for a given address.
  rpc VotingPowerByOwner(QueryVotingPowerByOwnerRequest) returns (QueryVotingPowerByOwnerResponse) {
    option (google.api.http).get = "/chainmain/tieredrewards/v1/voting_power/{owner}";
  }

  // TotalDelegatedVotingPower returns the total governance voting power from
  // all delegated tier positions.
  rpc TotalDelegatedVotingPower(QueryTotalDelegatedVotingPowerRequest)
      returns (QueryTotalDelegatedVotingPowerResponse) {
    option (google.api.http).get = "/chainmain/tieredrewards/v1/total_delegated_voting_power";
  }

  // RawTierPosition returns a single raw stored Position by ID (without computed amount).
  rpc RawTierPosition(QueryRawTierPositionRequest) returns (QueryRawTierPositionResponse) {
    option (google.api.http).get = "/chainmain/tieredrewards/v1/raw/position/{position_id}";
  }

  // RawTierPositionsByOwner returns all raw stored Positions for a given owner address.
  rpc RawTierPositionsByOwner(QueryRawTierPositionsByOwnerRequest) returns (QueryRawTierPositionsByOwnerResponse) {
    option (google.api.http).get = "/chainmain/tieredrewards/v1/raw/positions/{owner}";
  }

  // RawTierPositionsByTier returns all raw stored Positions for a given tier id.
  rpc RawTierPositionsByTier(QueryRawTierPositionsByTierRequest) returns (QueryRawTierPositionsByTierResponse) {
    option (google.api.http).get = "/chainmain/tieredrewards/v1/raw/positions_by_tier/{tier_id}";
  }

  // RawAllTierPositions returns all raw stored Positions with pagination.
  rpc RawAllTierPositions(QueryRawAllTierPositionsRequest) returns (QueryRawAllTierPositionsResponse) {
    option (google.api.http).get = "/chainmain/tieredrewards/v1/raw/positions";
  }

  // ValidatorData returns all validator-related data from the keeper for a given validator.
  rpc ValidatorData(QueryValidatorDataRequest) returns (QueryValidatorDataResponse) {
    option (google.api.http).get = "/chainmain/tieredrewards/v1/validator_data/{validator}";
  }

  // RedelegationMappings returns all tier position redelegation-entry mappings,
  // keyed by the staking unbonding id of each entry.
  rpc RedelegationMappings(QueryRedelegationMappingsRequest) returns (QueryRedelegationMappingsResponse) {
    option (google.api.http).get = "/chainmain/tieredrewards/v1/redelegation_mappings";
  }
}

// QueryParamsRequest is the request type for the Query/Params RPC method.
message QueryParamsRequest {}

// QueryParamsResponse is the response type for the Query/Params RPC method.
message QueryParamsResponse {
  // params defines the parameters of the module.
  Params params = 1 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

// QueryTierPositionRequest is the request type for the Query/TierPosition RPC method.
message QueryTierPositionRequest {
  uint64 position_id = 1;
}

// QueryTierPositionResponse is the response type for the Query/TierPosition RPC method.
message QueryTierPositionResponse {
  PositionResponse position = 1 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

// QueryTierPositionsByOwnerRequest is the request type for the Query/TierPositionsByOwner RPC method.
message QueryTierPositionsByOwnerRequest {
  string                                owner      = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

// QueryTierPositionsByOwnerResponse is the response type for the Query/TierPositionsByOwner RPC method.
message QueryTierPositionsByOwnerResponse {
  repeated PositionResponse              positions  = 1 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryTierPositionsByTierRequest is the request type for the Query/TierPositionsByTier RPC method.
message QueryTierPositionsByTierRequest {
  uint32                                tier_id    = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

// QueryTierPositionsByTierResponse is the response type for the Query/TierPositionsByTier RPC method.
message QueryTierPositionsByTierResponse {
  repeated PositionResponse              positions  = 1 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryAllTierPositionsRequest is the request type for the Query/AllTierPositions RPC method.
message QueryAllTierPositionsRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

// QueryAllTierPositionsResponse is the response type for the Query/AllTierPositions RPC method.
message QueryAllTierPositionsResponse {
  repeated PositionResponse              positions  = 1 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryTiersRequest is the request type for the Query/Tiers RPC method.
message QueryTiersRequest {}

// QueryTiersResponse is the response type for the Query/Tiers RPC method.
message QueryTiersResponse {
  repeated Tier tiers = 1 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

// QueryRewardsPoolBalancesRequest is the request type for the Query/RewardsPoolBalances RPC method.
message QueryRewardsPoolBalancesRequest {}

// QueryRewardsPoolBalancesResponse is the response type for the Query/RewardsPoolBalances RPC method.
message QueryRewardsPoolBalancesResponse {
  // address is the  rewards pool address
  string   address                           = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  repeated cosmos.base.v1beta1.Coin balances = 2 [
    (gogoproto.nullable)     = false,
    (gogoproto.castrepeated) = "github.com/cosmos/cosmos-sdk/types.Coins",
    (amino.dont_omitempty)   = true
  ];
}

// QueryEstimatePositionRewardsRequest is the request type for the Query/EstimatePositionRewards RPC method.
message QueryEstimatePositionRewardsRequest {
  uint64 position_id = 1;
}

// QueryEstimatePositionRewardsResponse is the response type for the Query/EstimatePositionRewards RPC method.
message QueryEstimatePositionRewardsResponse {
  // base_rewards is the estimated pending base staking rewards.
  repeated cosmos.base.v1beta1.Coin base_rewards = 1 [
    (gogoproto.nullable)     = false,
    (gogoproto.castrepeated) = "github.com/cosmos/cosmos-sdk/types.Coins",
    (amino.dont_omitempty)   = true
  ];

  // bonus_rewards is the estimated pending bonus APY rewards from the tier pool.
  repeated cosmos.base.v1beta1.Coin bonus_rewards = 2 [
    (gogoproto.nullable)     = false,
    (gogoproto.castrepeated) = "github.com/cosmos/cosmos-sdk/types.Coins",
    (amino.dont_omitempty)   = true
  ];
}

// QueryVotingPowerByOwnerRequest is the request type for the Query/VotingPowerByOwner RPC method.
message QueryVotingPowerByOwnerRequest {
  // owner is the address to query voting power for.
  string owner = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

// QueryVotingPowerByOwnerResponse is the response type for the Query/VotingPowerByOwner RPC method.
message QueryVotingPowerByOwnerResponse {
  // voting_power is the sum of token values for all delegated tier positions owned by the voter.
  string voting_power = 1 [
    (cosmos_proto.scalar)  = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable)   = false
  ];
}

// QueryTotalDelegatedVotingPowerRequest is the request type for the
// Query/TotalDelegatedVotingPower RPC method.
message QueryTotalDelegatedVotingPowerRequest {}

// QueryTotalDelegatedVotingPowerResponse is the response type for the
// Query/TotalDelegatedVotingPower RPC method.
message QueryTotalDelegatedVotingPowerResponse {
  // voting_power is the total voting power from all delegated tier positions.
  string voting_power = 1 [
    (cosmos_proto.scalar)  = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable)   = false
  ];
}

// QueryRawTierPositionRequest is the request type for the Query/RawTierPosition RPC method.
message QueryRawTierPositionRequest {
  uint64 position_id = 1;
}

// QueryRawTierPositionResponse is the response type for the Query/RawTierPosition RPC method.
message QueryRawTierPositionResponse {
  Position position = 1 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

// QueryRawTierPositionsByOwnerRequest is the request type for the Query/RawTierPositionsByOwner RPC method.
message QueryRawTierPositionsByOwnerRequest {
  string                                owner      = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

// QueryRawTierPositionsByOwnerResponse is the response type for the Query/RawTierPositionsByOwner RPC method.
message QueryRawTierPositionsByOwnerResponse {
  repeated Position                      positions  = 1 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryRawTierPositionsByTierRequest is the request type for the Query/RawTierPositionsByTier RPC method.
message QueryRawTierPositionsByTierRequest {
  uint32                                tier_id    = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

// QueryRawTierPositionsByTierResponse is the response type for the Query/RawTierPositionsByTier RPC method.
message QueryRawTierPositionsByTierResponse {
  repeated Position                      positions  = 1 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryRawAllTierPositionsRequest is the request type for the Query/RawAllTierPositions RPC method.
message QueryRawAllTierPositionsRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

// QueryRawAllTierPositionsResponse is the response type for the Query/RawAllTierPositions RPC method.
message QueryRawAllTierPositionsResponse {
  repeated Position                      positions  = 1 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryValidatorDataRequest is the request type for the Query/ValidatorData RPC method.
message QueryValidatorDataRequest {
  string validator = 1 [(cosmos_proto.scalar) = "cosmos.ValidatorAddressString"];
}

// QueryValidatorDataResponse is the response type for the Query/ValidatorData RPC method.
message QueryValidatorDataResponse {
  // position_count is the number of positions delegated to this validator.
  uint64 position_count = 1;

  // events are the pending validator lifecycle events.
  repeated ValidatorEvent events = 2 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];

  // event_current_seq is the current event sequence number for this validator.
  uint64 event_current_seq = 3;
}

// QueryRedelegationMappingsRequest is the request type for the
// Query/RedelegationMappings RPC method.
message QueryRedelegationMappingsRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

// QueryRedelegationMappingsResponse is the response type for the
// Query/RedelegationMappings RPC method.
message QueryRedelegationMappingsResponse {
  repeated RedelegationMapping redelegation_mappings = 1 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
  cosmos.base.query.v1beta1.PageResponse pagination  = 2;
}
