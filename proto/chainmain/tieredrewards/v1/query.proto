syntax = "proto3";
package chainmain.tieredrewards.v1;

import "amino/amino.proto";
import "chainmain/tieredrewards/v1/params.proto";
import "chainmain/tieredrewards/v1/types.proto";
import "cosmos/base/query/v1beta1/pagination.proto";
import "cosmos/base/v1beta1/coin.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";

option go_package = "github.com/crypto-org-chain/chain-main/x/tieredrewards/types";

// Query defines the gRPC querier service.
service Query {
  // Params returns the tieredrewards module parameters.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/chainmain/tieredrewards/v1/params";
  }

  // TierPosition returns a single position by ID.
  rpc TierPosition(QueryTierPositionRequest) returns (QueryTierPositionResponse) {
    option (google.api.http).get = "/chainmain/tieredrewards/v1/position/{position_id}";
  }

  // TierPositionsByOwner returns all positions for a given owner address.
  rpc TierPositionsByOwner(QueryTierPositionsByOwnerRequest) returns (QueryTierPositionsByOwnerResponse) {
    option (google.api.http).get = "/chainmain/tieredrewards/v1/positions/{owner}";
  }

  // AllTierPositions returns all positions with pagination.
  rpc AllTierPositions(QueryAllTierPositionsRequest) returns (QueryAllTierPositionsResponse) {
    option (google.api.http).get = "/chainmain/tieredrewards/v1/positions";
  }

  // Tiers returns all tier definitions.
  rpc Tiers(QueryTiersRequest) returns (QueryTiersResponse) {
    option (google.api.http).get = "/chainmain/tieredrewards/v1/tiers";
  }

  // TierPoolBalance returns the current balance of the bonus rewards pool.
  rpc TierPoolBalance(QueryTierPoolBalanceRequest) returns (QueryTierPoolBalanceResponse) {
    option (google.api.http).get = "/chainmain/tieredrewards/v1/pool_balance";
  }

  // EstimateTierRewards estimates pending base and bonus rewards for a position
  // without claiming them.
  rpc EstimateTierRewards(QueryEstimateTierRewardsRequest) returns (QueryEstimateTierRewardsResponse) {
    option (google.api.http).get = "/chainmain/tieredrewards/v1/estimate_rewards/{position_id}";
  }

  // TierVotingPower returns the governance voting power from delegated tier
  // positions for a given address.
  rpc TierVotingPower(QueryTierVotingPowerRequest) returns (QueryTierVotingPowerResponse) {
    option (google.api.http).get = "/chainmain/tieredrewards/v1/voting_power/{voter}";
  }
}

// QueryParamsRequest is the request type for the Query/Params RPC method.
message QueryParamsRequest {}

// QueryParamsResponse is the response type for the Query/Params RPC method.
message QueryParamsResponse {
  // params defines the parameters of the module.
  Params params = 1 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

// QueryTierPositionRequest is the request type for the Query/TierPosition RPC method.
message QueryTierPositionRequest {
  uint64 position_id = 1;
}

// QueryTierPositionResponse is the response type for the Query/TierPosition RPC method.
message QueryTierPositionResponse {
  Position position = 1 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

// QueryTierPositionsByOwnerRequest is the request type for the Query/TierPositionsByOwner RPC method.
message QueryTierPositionsByOwnerRequest {
  string owner = 1;
}

// QueryTierPositionsByOwnerResponse is the response type for the Query/TierPositionsByOwner RPC method.
message QueryTierPositionsByOwnerResponse {
  repeated Position positions = 1 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

// QueryAllTierPositionsRequest is the request type for the Query/AllTierPositions RPC method.
message QueryAllTierPositionsRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

// QueryAllTierPositionsResponse is the response type for the Query/AllTierPositions RPC method.
message QueryAllTierPositionsResponse {
  repeated Position positions = 1 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryTiersRequest is the request type for the Query/Tiers RPC method.
message QueryTiersRequest {}

// QueryTiersResponse is the response type for the Query/Tiers RPC method.
message QueryTiersResponse {
  repeated Tier tiers = 1 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

// QueryTierPoolBalanceRequest is the request type for the Query/TierPoolBalance RPC method.
message QueryTierPoolBalanceRequest {}

// QueryTierPoolBalanceResponse is the response type for the Query/TierPoolBalance RPC method.
message QueryTierPoolBalanceResponse {
  repeated cosmos.base.v1beta1.Coin balance = 1 [
    (gogoproto.nullable)     = false,
    (gogoproto.castrepeated) = "github.com/cosmos/cosmos-sdk/types.Coins",
    (amino.dont_omitempty)   = true
  ];
}

// QueryEstimateTierRewardsRequest is the request type for the Query/EstimateTierRewards RPC method.
message QueryEstimateTierRewardsRequest {
  uint64 position_id = 1;
}

// QueryEstimateTierRewardsResponse is the response type for the Query/EstimateTierRewards RPC method.
message QueryEstimateTierRewardsResponse {
  // base_rewards is the estimated pending base staking rewards.
  repeated cosmos.base.v1beta1.Coin base_rewards = 1 [
    (gogoproto.nullable)     = false,
    (gogoproto.castrepeated) = "github.com/cosmos/cosmos-sdk/types.Coins",
    (amino.dont_omitempty)   = true
  ];

  // bonus_rewards is the estimated pending bonus APY rewards from the tier pool.
  repeated cosmos.base.v1beta1.Coin bonus_rewards = 2 [
    (gogoproto.nullable)     = false,
    (gogoproto.castrepeated) = "github.com/cosmos/cosmos-sdk/types.Coins",
    (amino.dont_omitempty)   = true
  ];
}

// QueryTierVotingPowerRequest is the request type for the Query/TierVotingPower RPC method.
message QueryTierVotingPowerRequest {
  // voter is the address to query tier voting power for.
  string voter = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

// QueryTierVotingPowerResponse is the response type for the Query/TierVotingPower RPC method.
message QueryTierVotingPowerResponse {
  // voting_power is the sum of Amount for all delegated tier positions owned by the voter.
  string voting_power = 1 [
    (cosmos_proto.scalar)  = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable)   = false
  ];
}
