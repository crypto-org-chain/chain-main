syntax = "proto3";
package chainmain.tieredrewards.v1;

import "cosmos/base/v1beta1/coin.proto";
import "chainmain/tieredrewards/v1/tx.proto";
import "chainmain/tieredrewards/v1/types.proto";
import "cosmos_proto/cosmos.proto";
import "amino/amino.proto";
import "gogoproto/gogo.proto";

option go_package = "github.com/crypto-org-chain/chain-main/x/tieredrewards/types";

// TierChangeAction enumerates the type of change made to a tier.
enum TierChangeAction {
  TIER_CHANGE_ACTION_UNSPECIFIED = 0;
  TIER_CHANGE_ACTION_NEW         = 1;
  TIER_CHANGE_ACTION_UPDATE      = 2;
  TIER_CHANGE_ACTION_DELETE      = 3;
}

// EventTierChanged is emitted when a tier is added, updated, or deleted.
message EventTierChanged {
  // action is the type of change (add, update, delete).
  TierChangeAction action = 1;

  // tier is the updated tier at the time of the change.
  Tier tier = 2 [(gogoproto.nullable) = false];
}

// EventBaseRewardsTopUp is emitted when the base rewards pool tops up validator rewards.
message EventBaseRewardsTopUp {
  // topup is the additional rewards distributed to validators to achieve the target_base_rewards_rate.
  cosmos.base.v1beta1.Coin top_up = 1 [(gogoproto.nullable) = false];
}

// EventPositionCreated is emitted when a new position is created via MsgLockTier.
message EventPositionCreated {
  // position is the newly created position.
  Position position = 1 [(gogoproto.nullable) = false];
}

// EventDelegationCommited is emitted when a new position is created via CommitDelegationToTier.
message EventDelegationCommitted {
  // committed_delegation holds the details of the delegation commited.
  CommittedDelegation committed_delegation = 1 [(gogoproto.nullable) = false];
  // position is the newly created position.
  Position position = 2 [(gogoproto.nullable) = false];
}

// EventBaseRewardsClaimed is emitted when base staking rewards are claimed for a position.
message EventBaseRewardsClaimed {
  uint64   position_id                     = 1;
  string   owner                           = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  repeated cosmos.base.v1beta1.Coin amount = 3 [
    (gogoproto.nullable)     = false,
    (gogoproto.castrepeated) = "github.com/cosmos/cosmos-sdk/types.Coins",
    (amino.dont_omitempty)   = true
  ];
}

// EventBonusRewardsClaimed is emitted when bonus APY rewards are claimed for a position.
message EventBonusRewardsClaimed {
  uint64                   position_id = 1;
  string                   owner       = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  cosmos.base.v1beta1.Coin amount      = 3 [(gogoproto.nullable) = false];
}

// EventBaseRewardsPerShareUpdated is emitted when the cumulative rewards-per-share
// ratio is updated for a validator after withdrawing base rewards from x/distribution.
message EventBaseRewardsPerShareUpdated {
  // validator is the validator operator address.
  string validator = 1 [(cosmos_proto.scalar) = "cosmos.ValidatorAddressString"];

  // rewards_withdrawn is the base rewards withdrawn from x/distribution in this update.
  repeated cosmos.base.v1beta1.Coin rewards_withdrawn = 2 [
    (gogoproto.nullable)     = false,
    (gogoproto.castrepeated) = "github.com/cosmos/cosmos-sdk/types.Coins",
    (amino.dont_omitempty)   = true
  ];

  // cumulative_rewards_per_share is the new cumulative ratio after the update.
  repeated cosmos.base.v1beta1.DecCoin cumulative_rewards_per_share = 3 [
    (gogoproto.castrepeated) = "github.com/cosmos/cosmos-sdk/types.DecCoins",
    (gogoproto.nullable)     = false,
    (amino.dont_omitempty)   = true
  ];
}
