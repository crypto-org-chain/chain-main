syntax = "proto3";
package chainmain.tieredrewards.v1;

import "amino/amino.proto";
import "chainmain/tieredrewards/v1/params.proto";
import "chainmain/tieredrewards/v1/types.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "cosmos/base/v1beta1/coin.proto";
import "gogoproto/gogo.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/crypto-org-chain/chain-main/x/tieredrewards/types";

// Msg defines the tieredrewards Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams defines a governance operation for updating the x/tieredrewards module
  // parameters. The authority is hard-coded to the x/gov module account.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // AddTier creates a new tier. Authority-gated.
  rpc AddTier(MsgAddTier) returns (MsgAddTierResponse);

  // UpdateTier updates an existing tier. Authority-gated.
  rpc UpdateTier(MsgUpdateTier) returns (MsgUpdateTierResponse);

  // DeleteTier removes a tier. Authority-gated.
  rpc DeleteTier(MsgDeleteTier) returns (MsgDeleteTierResponse);

  // LockTier locks tokens into a tier, optionally delegating and/or triggering exit immediately.
  rpc LockTier(MsgLockTier) returns (MsgLockTierResponse);

  // CommitDelegationToTier allows a commitment of a delegation to a tier.
  rpc CommitDelegationToTier(MsgCommitDelegationToTier) returns (MsgCommitDelegationToTierResponse);
}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name)           = "chainmain/tieredrewards/MsgUpdateParams";

  // authority is the address that controls the module (defaults to x/gov module account).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the x/tieredrewards parameters to update.
  //
  // NOTE: All parameters must be supplied.
  Params params = 2 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

// MsgUpdateParamsResponse defines the response for MsgUpdateParams.
message MsgUpdateParamsResponse {}

// MsgAddTier creates a new tier.
message MsgAddTier {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name)           = "chainmain/tieredrewards/MsgAddTier";

  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  Tier   tier      = 2 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

// MsgAddTierResponse defines the response for MsgAddTier.
message MsgAddTierResponse {}

// MsgUpdateTier updates an existing tier.
message MsgUpdateTier {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name)           = "chainmain/tieredrewards/MsgUpdateTier";

  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  Tier   tier      = 2 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

// MsgUpdateTierResponse defines the response for MsgUpdateTier.
message MsgUpdateTierResponse {}

// MsgDeleteTier removes a tier.
message MsgDeleteTier {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name)           = "chainmain/tieredrewards/MsgDeleteTier";

  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint32 id        = 2;
}

// MsgDeleteTierResponse defines the response for MsgDeleteTier.
message MsgDeleteTierResponse {}

// MsgLockTier locks tokens into a tier.
message MsgLockTier {
  option (cosmos.msg.v1.signer) = "owner";
  option (amino.name)           = "chainmain/tieredrewards/MsgLockTier";

  // owner is the address locking tokens.
  string owner = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // id is the tier id to lock into.
  uint32 id = 2;

  // amount is the amount of tokens intended to be locked into this new position.
  string amount = 3 [
    (cosmos_proto.scalar)  = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable)   = false,
    (amino.dont_omitempty) = true
  ];

  // validator_address is the optional validator to delegate to at lock time. Empty means no delegation.
  string validator_address = 4 [(cosmos_proto.scalar) = "cosmos.ValidatorAddressString"];

  // trigger_exit_immediately if true starts the exit commitment from lock time.
  bool trigger_exit_immediately = 5;
}

// MsgLockTierResponse defines the response for MsgLockTier.
message MsgLockTierResponse {}

// MsgCommitDelegationToTier commits an existing delegation to a tier position (same validator, no unbonding).
message MsgCommitDelegationToTier {
  option (cosmos.msg.v1.signer) = "delegator_address";
  option (amino.name)           = "chainmain/MsgCommitDelegationToTier";

  option (gogoproto.equal)           = false;
  option (gogoproto.goproto_getters) = false;

  // delegator_address is the address of the delegator committing their delegation.
  string delegator_address = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // validator_address is the validator whose delegation is being committed (same validator).
  string validator_address = 2 [(cosmos_proto.scalar) = "cosmos.ValidatorAddressString"];
  // amount is the amount of delegated tokens committed into this new position.
  string amount = 3 [
    (cosmos_proto.scalar)  = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable)   = false,
    (amino.dont_omitempty) = true
  ];
  // id is the tier id to commit into.
  uint32 id = 4;
  // trigger_exit_immediately if true starts the exit commitment from lock time.
  bool trigger_exit_immediately = 5;
}

// MsgCommitDelegationToTierResponse defines the response for MsgCommitDelegationToTier.
message MsgCommitDelegationToTierResponse {}
