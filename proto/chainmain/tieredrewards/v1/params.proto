syntax = "proto3";
package chainmain.tieredrewards.v1;

import "amino/amino.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";

option go_package = "github.com/crypto-org-chain/chain-main/x/tieredrewards/types";

// Params holds parameters for the tieredrewards module.
message Params {
  // target_base_rewards_rate is the target base rewards rate for validators.
  string target_base_rewards_rate = 1 [
    (cosmos_proto.scalar)  = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable)   = false,
    (amino.dont_omitempty) = true
  ];

  // pool_funders is the list of addresses authorized to fund the tier rewards pool.
  // Managed via MsgUpdateParams (governance).
  repeated string pool_funders = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}
