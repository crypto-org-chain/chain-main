syntax = "proto3";
package chainmain.tieredrewards.v1;

import "chainmain/tieredrewards/v1/params.proto";
import "chainmain/tieredrewards/v1/position.proto";
import "cosmos/base/v1beta1/coin.proto";
import "gogoproto/gogo.proto";

option go_package = "github.com/crypto-org-chain/chain-main/x/tieredrewards/types";

// GenesisState defines the tieredrewards module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [(gogoproto.nullable) = false];

  // positions is the list of all tier positions.
  repeated TierPosition positions = 2 [(gogoproto.nullable) = false];

  // next_position_id is the next available position ID.
  uint64 next_position_id = 3;

  // pending_base_rewards tracks pending base rewards per validator.
  repeated PendingBaseReward pending_base_rewards = 4 [(gogoproto.nullable) = false];
}
