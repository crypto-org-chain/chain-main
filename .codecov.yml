codecov:
  # Only post codecov status once the CI run that produced the coverage has
  # succeeded, so a mid-run partial upload can never flip the status red
  # while other jobs are still running / will soon replace its data.
  require_ci_to_pass: yes
  notify:
    # 11 unconditional integration uploads; upgrade and unit-test uploads 
    # are conditional. For all of them before computing the final status — 
    # otherwise codecov reports off an incomplete subset and shows spurious 
    #drops.
    after_n_builds: 11

coverage:
  precision: 2
  round: down
  range: 70...100

  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        # New/changed lines should reach a sensible coverage bar; flagged
        # informational so a single miss does not block a PR merge.
        target: 70%
        threshold: 5%
        informational: true
    changes: false

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: true

ignore:
  - "docs"
  - "**/*.md"
  - "**/*.rst"
  # Generated protobuf / grpc-gateway / pulsar sources.
  - "**/*.pb.go"
  - "**/*.pb.gw.go"
  - "**/*.pulsar.go"
  # Generated python protobuf for pystarport.
  - "pystarport/proto_python"
  # Cosmos SDK expected-keeper interface files are pass-through aliases.
  - "**/expected_keepers.go"
  # Test harness / simulation helpers.
  - "app/sim_test.go"
  - "app/test_helpers.go"
  - "tests"
